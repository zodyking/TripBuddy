services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3847:3847"
    environment:
      - FEDEX_TOOL_API_HOST=0.0.0.0
      - FEDEX_TOOL_API_PORT=3847
      - NODE_ENV=production
      - WAHA_BASE_URL=http://waha:3000
    depends_on:
      waha:
        condition: service_started
    volumes:
      - app_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3847/api/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  waha:
    image: devlikeapro/waha
    environment:
      - WHATSAPP_DEFAULT_ENGINE=NOWEB
      - WHATSAPP_START_SESSION=default
      - WHATSAPP_HOOK_EVENTS=message,message.any
      - WAHA_PRINT_QR=true
    volumes:
      - waha_sessions:/app/.sessions
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    restart: unless-stopped

volumes:
  app_data:
  waha_sessions:
